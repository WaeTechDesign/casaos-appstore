name: immich-hackwae

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:v2
    restart: always

    ports:
      - "2283:2283"

    volumes:
      - /mnt/raid/immich-photos:/data
      - /etc/localtime:/etc/localtime:ro

    environment:
      TZ: Asia/Makassar
      DB_PASSWORD: postgres
      DB_USERNAME: postgres
      DB_DATABASE_NAME: immich
      DB_HOSTNAME: database
      REDIS_HOSTNAME: redis

    depends_on:
      - redis
      - database

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:v2
    restart: always

    volumes:
      - /DATA/AppData/immich-hackwae/cache:/cache

    environment:
      TZ: Asia/Makassar
      DB_PASSWORD: postgres
      DB_USERNAME: postgres
      DB_DATABASE_NAME: immich
      DB_HOSTNAME: database
      REDIS_HOSTNAME: redis

    depends_on:
      - database
      - redis

  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:9
    restart: always

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    restart: always

    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: immich
      POSTGRES_INITDB_ARGS: '--data-checksums'

    volumes:
      - /DATA/AppData/immich-hackwae/db:/var/lib/postgresql/data

    shm_size: 128mb

x-casaos:
  store_app_id: immich-hackwae

  architectures:
    - amd64
    - arm64

  main: immich-server
  category: HackWae-Appstore

  port_map: "2283"
  scheme: http
  index: /

  title:
    en_us: Immich HackWae

  description:
    en_us: Immich (Google Photos alternative) optimized for CasaOS.

  developer: HackWae
  version: "1.0.2"

  icon: https://cdn.jsdelivr.net/gh/selfhst/icons/png/immich.png
  thumbnail: https://cdn.jsdelivr.net/gh/selfhst/icons/png/immich.png

  tips:
    before_install:
      en_us: >
        🌐 Web UI:
        http://IP:2283

        📁 Upload path:
        /mnt/raid/immich-photos

        🗄 Database path:
        /DATA/AppData/immich-hackwae/db

        Login dibuat saat pertama buka web