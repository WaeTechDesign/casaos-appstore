name: web-lab-hackwae

services:
  app:
    image: nginx:latest
    restart: unless-stopped

    ports:
      - target: 80
        published: 8088
        protocol: tcp

    volumes:
      - type: bind
        source: /DATA/AppData/web-lab/sites
        target: /var/www
        bind:
          create_host_path: true

      - type: bind
        source: /DATA/AppData/web-lab/nginx
        target: /etc/nginx/conf.d
        bind:
          create_host_path: true

x-casaos:
  store_app_id: web-lab-hackwae
  architectures:
    - amd64
    - arm64

  main: app
  category: HackWae-Appstore
  port_map: "8088"
  scheme: http
  index: /
  webui: http://[HOST]:[PORT]

  icon: https://raw.githubusercontent.com/WaeTechDesign/casaos-appstore/main/Apps/icon/nginx.png
  thumbnail: https://raw.githubusercontent.com/WaeTechDesign/casaos-appstore/main/Apps/icon/nginx.png

  title:
    en_us: HackWae Web Lab

  description:
    en_us: |
      Nginx Web Lab for testing multiple websites locally using wildcard domains.

  tips:
    en_us: |-
      🚀 Usage Guide

      Create folder:

      /DATA/AppData/web-lab/sites/app1

      Add index.html inside.

      Access:

      http://app1.localhost:8088

      Supports unlimited websites without editing nginx config.

  developer: HackWae
  version: "1.0.0"